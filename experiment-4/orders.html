<!DOCTYPE html>
<html>
<head>
    <title>SmartStore - Order</title>
    <link rel="stylesheet" href="main.css">

</head>

<body>

    <center>
        <h1>Place Your Order</h1>
        <p>
            <a href="home.html">Home</a> |
            <a href="product.html">Products</a> |
            <a href="orders.html">Order</a>
        </p>
    </center>

    <hr>

    <form>

        Name:<br>
        <input type="text" name="name"><br><br>

        Email:<br>
        <input type="email" name="email"><br><br>

        Select Product:<br>
        <select>
            <option>Laptop</option>
            <option>Wireless Headphones</option>
            <option>Smart Watch</option>
            <option>USB Drive (64GB)</option>
        </select><br><br>

        Quantity:<br>
        <input type="number" min="1"><br><br>

        Address:<br>
        <textarea rows="4" cols="40"></textarea><br><br>

        <input type="submit" value="Confirm Order">
        <input type="reset" value="Clear">

    </form>

    <hr>

    <center>
        <p>&copy; 2026 SmartStore</p>
    </center>

</body>
</html>
