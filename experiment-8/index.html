<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Experiment 8 Output</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: linear-gradient(to right, #dbeafe, #fce7f3);
            padding: 30px;
            color: #222;
        }

        .container {
            max-width: 1200px;
            margin: auto;
        }

        h1 {
            text-align: center;
            color: #0f172a;
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            margin-bottom: 35px;
            font-size: 18px;
            color: #334155;
        }

        .exercise {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.12);
        }

        .exercise h2 {
            margin-bottom: 18px;
            color: #1d4ed8;
            border-left: 5px solid #1d4ed8;
            padding-left: 10px;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 20px;
        }

        .card {
            background: #f8fafc;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.10);
            transition: 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.16);
        }

        .card img {
            width: 100%;
            height: 500px;
            object-fit: contain;
            display: block;
            background:white;
            padding: 10px;
        }

        .caption {
            text-align: center;
            padding: 12px;
            font-weight: bold;
            background: #e2e8f0;
            color: #1e293b;
        }

        @media (max-width: 600px) {
            .card img {
                height: 200px;
            }

            h1 {
                font-size: 24px;
            }

            .exercise h2 {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Experiment 8 - Output Screenshots</h1>
        
        <div class="exercise">
            <h2>Exercise 1</h2>
            <div class="gallery">
                <div class="card">
                    <img src="excercise1.png" alt="Exercise 1 Output">
                    <div class="caption">Exercise 1 Output</div>
                </div>
            </div>
        </div>

        <div class="exercise">
            <h2>Exercise 2</h2>
            <div class="gallery">
                <div class="card">
                    <img src="excercise2.jpg" alt="Exercise 2 Output">
                    <div class="caption">Exercise 2 Output</div>
                </div>
            </div>
        </div>

        <div class="exercise">
            <h2>Exercise 3</h2>
            <div class="gallery">
                <div class="card">
                    <img src="excercise3(i).png" alt="Exercise 3 Screenshot 1">
                    <div class="caption">Exercise 3 - Screenshot 1</div>
                </div>

                <div class="card">
                    <img src="excercise3(ii).png" alt="Exercise 3 Screenshot 2">
                    <div class="caption">Exercise 3 - Screenshot 2</div>
                </div>

                <div class="card">
                    <img src="excercise3(iii).png" alt="Exercise 3 Screenshot 3">
                    <div class="caption">Exercise 3 - Screenshot 3</div>
                </div>

                <div class="card">
                    <img src="excercise3(iv).jpg" alt="Exercise 3 Screenshot 4">
                    <div class="caption">Exercise 3 - Screenshot 4</div>
                </div>
            </div>
        </div>

        <div class="exercise">
            <h2>Exercise 4</h2>
            <div class="gallery">
                <div class="card">
                    <img src="excercise4.jpg" alt="Exercise 4 Output">
                    <div class="caption">Exercise 4 Output</div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
